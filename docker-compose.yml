version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portfolio_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/portfolio_tracker?schema=public
      - NEXTAUTH_SECRET=fallback_secret_for_local_dev
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db

volumes:
  postgres-data:
